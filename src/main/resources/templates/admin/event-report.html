<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event Report | TechFest 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Manrope', sans-serif; background: #F7F6F2; color: #111118; }

        .header {
            background: rgba(255,255,255,.98);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #E5E2D9;
            padding: 0 32px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #1D4ED8 0%, #7C3AED 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #1D4ED8 0%, #7C3AED 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-text span { color: #D97706; background: none; }

        .header-right { display: flex; align-items: center; gap: 20px; }
        .admin-name {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #F7F6F2;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
        }
        .admin-name span {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, #1D4ED8 0%, #7C3AED 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .logout-btn {
            background: #DC2626;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }
        .logout-btn:hover { background: #B91C1C; }

        .navbar {
            background: white;
            border-bottom: 1px solid #E5E2D9;
            position: sticky;
            top: 70px;
            z-index: 999;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
        }
        .nav-link {
            padding: 14px 20px;
            text-decoration: none;
            color: #55525F;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }
        .nav-link:hover { color: #1D4ED8; background: #F7F6F2; }
        .nav-link.active { color: #1D4ED8; border-bottom-color: #1D4ED8; }

        .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #1D4ED8; text-decoration: none; }

        .report-container {
            background: white;
            border-radius: 16px;
            border: 1px solid #E5E2D9;
            padding: 24px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: #666;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #F8F9FA;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #1D4ED8;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        .error-message {
            text-align: center;
            padding: 40px;
            color: #DC2626;
        }

        .footer {
            background: #0A0A10;
            color: rgba(255,255,255,0.4);
            text-align: center;
            padding: 24px;
            font-size: 13px;
            margin-top: 48px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <div class="logo-icon">TF</div>
        <div class="logo-text">Tech<span>Fest</span> 2025</div>
    </div>
    <div class="header-right">
        <div class="admin-name"><span>A</span> Admin</div>
        <a href="/admin/logout" class="logout-btn">Logout</a>
    </div>
</div>

<div class="navbar">
    <div class="nav-container">
        <a href="/admin/dashboard" class="nav-link">Dashboard</a>
        <a href="/admin/events" class="nav-link">Events</a>
        <a href="/admin/registrations" class="nav-link">Registrations</a>
        <a href="/admin/judges" class="nav-link">Manage Judges</a>
        <a href="/admin/assign-judge" class="nav-link">Assign Judge</a>
        <a href="/admin/design-criteria" class="nav-link">Design Criteria</a>
        <a href="/admin/certificates" class="nav-link">Certificates</a>
        <a href="/judge/login" class="nav-link" target="_blank">Judge Login</a>
    </div>
</div>

<div class="main">
    <a href="/admin/events" class="back-link">← Back to Events</a>

    <div class="report-container">
        <div id="reportContent" class="loading">Loading report data...</div>
    </div>
</div>

<footer class="footer">
    Designed & Developed with ❤ by <strong style="color: #DAA520;">Sumit Dipak Thakare</strong>
    <br>
    <small>© 2025 TechFest 2025 | VIIT Baramati</small>
</footer>

<script>
    const eventId = [[${eventId}]];

    async function loadReport() {
        try {
            const response = await fetch(`/admin/events/report/${eventId}`);
            const data = await response.json();

            if (response.ok) {
                displayReport(data);
            } else {
                document.getElementById('reportContent').innerHTML = `<div class="error-message">❌ Error: ${data.error || 'Failed to load report'}</div>`;
            }
        } catch (error) {
            document.getElementById('reportContent').innerHTML = `<div class="error-message">❌ Error loading report. Please try again.</div>`;
        }
    }

    function displayReport(data) {
        const html = `
            <h2 style="margin-bottom: 20px;">📊 ${data.eventName} - Report</h2>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">${data.totalParticipants}</div>
                    <div class="stat-label">Total Participants</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${data.approvedParticipants}</div>
                    <div class="stat-label">Approved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${data.pendingParticipants}</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">₹${data.totalCollected}</div>
                    <div class="stat-label">Total Collected</div>
                </div>
            </div>

            <div class="stats-grid" style="margin-top: 20px;">
                <div class="stat-card">
                    <div class="stat-number">${data.avgScore}</div>
                    <div class="stat-label">Average Score</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${data.topScore}</div>
                    <div class="stat-label">Top Score</div>
                </div>
            </div>
        `;
        document.getElementById('reportContent').innerHTML = html;
    }

    loadReport();
</script>

</body>
</html>
